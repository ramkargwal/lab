<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Traffic Racer Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0d0d0f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 10;
        }
        #score-val, #speed-val {
            color: #c0ff47; /* Electric Lime accent color */
        }
        #game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            text-align: center;
            background: rgba(29, 28, 38, 0.85);
            padding: 30px 50px;
            border-radius: 16px;
            border: 2px solid #9747ff;
            display: none;
            z-index: 20;
        }
        #restart-btn {
            background-color: #c0ff47;
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s;
        }
        #restart-btn:hover {
            transform: scale(1.05);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <div>Score: <span id="score-val">0</span></div>
        <div style="font-size: 16px; margin-top: 5px;">Speed: <span id="speed-val">100</span> km/h</div>
    </div>

    <div id="game-over-screen">
        <h1 style="color: #ff9c9c; margin: 0 0 10px 0;">CRASH!</h1>
        <p style="font-size: 18px; margin: 0;">Your Final Score: <span id="final-score" style="color:#c0ff47; font-weight:bold;">0</span></p>
        <button id="restart-btn" onclick="resetGame()">Play Again</button>
    </div>

    <script>
        // --- Game Variables & Setup ---
        let scene, camera, renderer;
        let playerCar;
        let road, roadGeom;
        let trafficCars = [];
        let keys = { ArrowLeft: false, ArrowRight: false, KeyA: false, KeyD: false };
        
        let gameActive = true;
        let score = 0;
        let gameSpeed = 0.8; // Initial movement speed
        const laneWidth = 3.5;
        const totalLanes = 3;
        const roadLength = 300;

        // Colors
        const playerColor = 0x9747ff; // Purple
        const trafficColors = [0xff9c9c, 0xffc850, 0x0094c7, 0xffffff]; // Red, Yellow, Blue, White

        init();
        animate();

        function init() {
            // 1. Scene Creation
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0f);
            scene.fog = new THREE.FogExp2(0x0a0a0f, 0.015);

            // 2. Camera Setup
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            // Position camera behind and above the car (Third-person view)
            camera.position.set(0, 4, 8);
            camera.lookAt(0, 1, -10);

            // 3. Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 4. Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            // 5. Build Road Segment
            createRoad();

            // 6. Spawn Player Car
            createPlayerCar();

            // 7. Input Event Listeners
            window.addEventListener('keydown', (e) => { if(e.code in keys) keys[e.code] = true; });
            window.addEventListener('keyup', (e) => { if(e.code in keys) keys[e.code] = false; });
            window.addEventListener('resize', onWindowResize);
        }

        // --- Procedural Generation Functions ---
        function createRoad() {
            const roadWidth = laneWidth * totalLanes;
            roadGeom = new THREE.PlaneGeometry(roadWidth, roadLength);
            const roadMat = new THREE.MeshStandardMaterial({ 
                color: 0x1d1d21, 
                roughness: 0.8 
            });
            road = new THREE.Mesh(roadGeom, roadMat);
            road.rotation.x = -Math.PI / 2; // Lay flat
            road.position.set(0, 0, -roadLength / 4);
            scene.add(road);

            // Adding Simple Lane Markings
            const lineGeom = new THREE.PlaneGeometry(0.1, roadLength);
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            
            for (let i = 1; i < totalLanes; i++) {
                let posX = -roadWidth/2 + (i * laneWidth);
                let leftLine = new THREE.Mesh(lineGeom, lineMat);
                leftLine.rotation.x = -Math.PI / 2;
                leftLine.position.set(posX, 0.01, -roadLength / 4);
                scene.add(leftLine);
            }
        }

        function createPlayerCar() {
            // Composite object for the car
            playerCar = new THREE.Group();

            // Car Body
            const bodyGeom = new THREE.BoxGeometry(1.6, 0.6, 3);
            const bodyMat = new THREE.MeshStandardMaterial({ color: playerColor, roughness: 0.2 });
            const body = new THREE.Mesh(bodyGeom, bodyMat);
            body.position.y = 0.4;
            playerCar.add(body);

            // Car Cabin (Glass area)
            const cabinGeom = new THREE.BoxGeometry(1.3, 0.5, 1.4);
            const cabinMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1 });
            const cabin = new THREE.Mesh(cabinGeom, cabinMat);
            cabin.position.set(0, 0.85, -0.2);
            playerCar.add(cabin);

            // Initial Position
            playerCar.position.set(0, 0, 0);
            scene.add(playerCar);
        }

        function spawnTrafficCar() {
            if (trafficCars.length > 8) return; // Cap maximum vehicles on screen

            const trafficGroup = new THREE.Group();
            
            // Randomly select a target lane (-3.5, 0, or 3.5)
            const randomLaneIndex = Math.floor(Math.random() * totalLanes);
            const posX = -laneWidth + (randomLaneIndex * laneWidth);
            
            // Avoid spawning immediately on top of another vehicle in the same lane
            const startZ = -120 - Math.random() * 40;
            for(let car of trafficCars) {
                if(car.position.x === posX && Math.abs(car.position.z - startZ) < 15) {
                    return; // Abort spawn to prevent overlaps
                }
            }

            // Design Traffic Car
            const bodyGeom = new THREE.BoxGeometry(1.6, 0.6, 3);
            const randomColor = trafficColors[Math.floor(Math.random() * trafficColors.length)];
            const bodyMat = new THREE.MeshStandardMaterial({ color: randomColor, roughness: 0.4 });
            const body = new THREE.Mesh(bodyGeom, bodyMat);
            body.position.y = 0.4;
            trafficGroup.add(body);

            trafficGroup.position.set(posX, 0, startZ);
            scene.add(trafficGroup);
            trafficCars.push(trafficGroup);
        }

        // --- Game Loop & Logic ---
        function animate() {
            requestAnimationFrame(animate);

            if (gameActive) {
                // 1. Handle Input & Player Bounds
                if (keys.ArrowLeft || keys.KeyA) playerCar.position.x -= 0.12;
                if (keys.ArrowRight || keys.KeyD) playerCar.position.x += 0.12;

                // Enforce road edges boundaries
                const maxDrift = (laneWidth * totalLanes / 2) - 0.8;
                if (playerCar.position.x < -maxDrift) playerCar.position.x = -maxDrift;
                if (playerCar.position.x > maxDrift) playerCar.position.x = maxDrift;

                // 2. Drive & Process Traffic Environment
                if (Math.random() < 0.03) {
                    spawnTrafficCar();
                }

                for (let i = trafficCars.length - 1; i >= 0; i--) {
                    let tCar = trafficCars[i];
                    // Traffic moves slower than the player creating relative forward motion
                    tCar.position.z += gameSpeed * 0.45; 

                    // Check for Collisions (Bounding Box approximation)
                    if (Math.abs(playerCar.position.x - tCar.position.x) < 1.4 &&
                        Math.abs(playerCar.position.z - tCar.position.z) < 2.8) {
                        endGame();
                    }

                    // Remove out of bound vehicles behind player
                    if (tCar.position.z > 15) {
                        scene.remove(tCar);
                        trafficCars.splice(i, 1);
                        score += 10; // Earn points for clean passes
                    }
                }

                // 3. Dynamic Progression
                score += 1;
                gameSpeed += 0.0001; // Scale up difficulty gradually
                
                // Keep the endless road texture illusion aligned
                road.position.z = (playerCar.position.z) - 50;

                // Update UI Layout
                document.getElementById('score-val').innerText = Math.floor(score);
                document.getElementById('speed-val').innerText = Math.floor(gameSpeed * 180);
            }

            renderer.render(scene, camera);
        }

        // --- State Management ---
        function endGame() {
            gameActive = false;
            document.getElementById('final-score').innerText = Math.floor(score);
            document.getElementById('game-over-screen').style.display = 'block';
        }

        function resetGame() {
            // Clean active traffic
            for (let car of trafficCars) {
                scene.remove(car);
            }
            trafficCars = [];

            // Reset States
            playerCar.position.set(0, 0, 0);
            score = 0;
            gameSpeed = 0.8;
            gameActive = true;
            document.getElementById('game-over-screen').style.display = 'none';
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
